# MkDocs Material configuration for RegiLattice
# Reference: https://squidfunk.github.io/mkdocs-material/
#
# Local dev:
#   pip install mkdocs-material
#   mkdocs serve          # Live-reload at http://localhost:8000
#
# Build (static HTML):
#   mkdocs build --strict
#
# Deploy to GitHub Pages:
#   mkdocs gh-deploy --force   (or via CI — see .github/workflows/ci.yml)

site_name: RegiLattice Docs
site_description: Windows registry tweak toolkit — 7718 tweaks across 158 categories
site_url: https://rajwanyair.github.io/RegiLattice/
repo_url: https://github.com/RajwanYair/RegiLattice
repo_name: RajwanYair/RegiLattice
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: .mkdocs-site

# ── Theme ────────────────────────────────────────────────────────────────────

theme:
  name: material
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode (matches Catppuccin Mocha feel)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.tabs
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  icon:
    repo: fontawesome/brands/github
  logo: assets/banner.svg
  favicon: assets/banner.svg

# ── Plugins ──────────────────────────────────────────────────────────────────

plugins:
  - search:
      lang: en

# ── Extensions ───────────────────────────────────────────────────────────────

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

# ── Navigation ───────────────────────────────────────────────────────────────

nav:
  - Home: index.md
  - Getting Started:
      - Architecture: Architecture.md
      - Development: Development.md
      - CONTRIBUTING.md
  - Reference:
      - CLI Reference: CLI-Reference.md
      - API Reference: Api.md
      - Tweak Categories: TweakCategories.md
      - Pack Authoring: PackAuthoring.md
  - Roadmap: Roadmap.md
  - Changelog: CHANGELOG.md
  - Security: SECURITY.md
  - Troubleshooting: Troubleshooting.md

# ── Extra ─────────────────────────────────────────────────────────────────────

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/RajwanYair/RegiLattice
  version:
    provider: mike

copyright: Copyright &copy; 2025-2026 RajwanYair
