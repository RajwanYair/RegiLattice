<svg xmlns="http://www.w3.org/2000/svg" width="900" height="200" viewBox="0 0 900 200">
  <defs>
    <linearGradient id="bgG" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="sh">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#11111b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="url(#bgG)" rx="12"/>

  <!-- Stat 1: Tweaks -->
  <g filter="url(#sh)" transform="translate(30, 30)">
    <rect width="150" height="140" rx="10" fill="#313244"/>
    <rect width="150" height="3" rx="2" fill="#a6e3a1"/>
    <text x="75" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="#a6e3a1">5 375</text>
    <text x="75" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#cdd6f4">Tweaks</text>
    <text x="75" y="100" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#585b70">verified &amp; reversible</text>
    <text x="75" y="125" text-anchor="middle" font-size="28">&#x2699;</text>
  </g>

  <!-- Stat 2: Categories -->
  <g filter="url(#sh)" transform="translate(205, 30)">
    <rect width="150" height="140" rx="10" fill="#313244"/>
    <rect width="150" height="3" rx="2" fill="#89b4fa"/>
    <text x="75" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="#89b4fa">253</text>
    <text x="75" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#cdd6f4">Categories</text>
    <text x="75" y="100" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#585b70">organized modules</text>
    <text x="75" y="125" text-anchor="middle" font-size="28">&#x1F4C2;</text>
  </g>

  <!-- Stat 3: Tests -->
  <g filter="url(#sh)" transform="translate(380, 30)">
    <rect width="150" height="140" rx="10" fill="#313244"/>
    <rect width="150" height="3" rx="2" fill="#f9e2af"/>
    <text x="75" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="#f9e2af">2 693</text>
    <text x="75" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#cdd6f4">Tests</text>
    <text x="75" y="100" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#585b70">xUnit &#x2022; 0 failures</text>
    <text x="75" y="125" text-anchor="middle" font-size="28">&#x2705;</text>
  </g>

  <!-- Stat 4: Themes -->
  <g filter="url(#sh)" transform="translate(555, 30)">
    <rect width="150" height="140" rx="10" fill="#313244"/>
    <rect width="150" height="3" rx="2" fill="#f38ba8"/>
    <text x="75" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="#f38ba8">11</text>
    <text x="75" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#cdd6f4">Themes</text>
    <text x="75" y="100" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#585b70">dark &amp; light modes</text>
    <text x="75" y="125" text-anchor="middle" font-size="28">&#x1F3A8;</text>
  </g>

  <!-- Stat 5: Profiles -->
  <g filter="url(#sh)" transform="translate(730, 30)">
    <rect width="140" height="140" rx="10" fill="#313244"/>
    <rect width="140" height="3" rx="2" fill="#b4befe"/>
    <text x="70" y="55" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="36" fill="#b4befe">5</text>
    <text x="70" y="80" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="14" fill="#cdd6f4">Profiles</text>
    <text x="70" y="100" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#585b70">gaming &#x2022; privacy &#x2022; ...</text>
    <text x="70" y="125" text-anchor="middle" font-size="28">&#x1F464;</text>
  </g>
</svg>
