  <line x1="398" y1="205" x2="352" y2="383" stroke="#a6e3a1" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5"/>
  <line x1="398" y1="289" x2="352" y2="284" stroke="#f9e2af" stroke-width="1.2" stroke-dasharray="5 3" opacity="0.5"/>
