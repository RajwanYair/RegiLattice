  <text x="207" y="238" font-family="'Cascadia Code', monospace" font-size="8" fill="#585b70">project ref</text>
  <line x1="195" y1="342" x2="195" y2="330" stroke="#f9e2af" stroke-width="1.6" opacity="0.5"/>
  <text x="207" y="340" font-family="'Cascadia Code', monospace" font-size="8" fill="#585b70">project ref</text>

