    <text x="750" y="308" font-family="'Segoe UI', Arial, sans-serif" font-size="16">&#x1F4E6;</text>
    <text x="774" y="308" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#fab387">Package Registries &#x2014; Scoop &#x2022; WinGet &#x2022; Choco &#x2022; npm</text>
