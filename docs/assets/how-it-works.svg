<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="180" viewBox="0 0 1000 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="s">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#11111b" flood-opacity="0.5"/>
    </filter>
    <marker id="a" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#585b70"/>
    </marker>
  </defs>

  <rect width="1000" height="180" fill="url(#bg)" rx="12"/>

  <!-- Step 1: Choose -->
  <g filter="url(#s)" transform="translate(30, 30)">
    <rect width="160" height="110" rx="10" fill="#316044" stroke="#89b4fa" stroke-width="1.5"/>
    <text x="80" y="40" text-anchor="middle" font-size="24">&#x1F50D;</text>
    <text x="80" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#89b4fa">1. Browse</text>
    <text x="80" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Search &amp; filter</text>
    <text x="80" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">7 518 tweaks</text>
  </g>

  <!-- Arrow 1→2 -->
  <line x1="195" y1="80" x2="225" y2="80" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 2: Preview -->
  <g filter="url(#s)" transform="translate(230, 30)">
    <rect width="160" height="110" rx="10" fill="#316044" stroke="#f9e2af" stroke-width="1.5"/>
    <text x="80" y="40" text-anchor="middle" font-size="24">&#x1F441;</text>
    <text x="80" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#f9e2af">2. Preview</text>
    <text x="80" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Dry-run mode</text>
    <text x="80" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">See what changes</text>
  </g>

  <!-- Arrow 2→3 -->
  <line x1="395" y1="80" x2="425" y2="80" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 3: Apply -->
  <g filter="url(#s)" transform="translate(430, 30)">
    <rect width="160" height="110" rx="10" fill="#316044" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="80" y="40" text-anchor="middle" font-size="24">&#x2699;</text>
    <text x="80" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#a6e3a1">3. Apply</text>
    <text x="80" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Auto-backup first</text>
    <text x="80" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Safe registry write</text>
  </g>

  <!-- Arrow 3→4 -->
  <line x1="595" y1="80" x2="625" y2="80" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 4: Detect -->
  <g filter="url(#s)" transform="translate(630, 30)">
    <rect width="160" height="110" rx="10" fill="#316044" stroke="#b4befe" stroke-width="1.5"/>
    <text x="80" y="40" text-anchor="middle" font-size="24">&#x2705;</text>
    <text x="80" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#b4befe">4. Verify</text>
    <text x="80" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Auto-detect status</text>
    <text x="80" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Live confirmation</text>
  </g>

  <!-- Arrow 4→5 -->
  <line x1="795" y1="80" x2="825" y2="80" stroke="#585b70" stroke-width="1.5" marker-end="url(#a)"/>

  <!-- Step 5: Revert -->
  <g filter="url(#s)" transform="translate(830, 30)">
    <rect width="140" height="110" rx="10" fill="#316044" stroke="#f38ba8" stroke-width="1.5"/>
    <text x="70" y="40" text-anchor="middle" font-size="24">&#x21A9;</text>
    <text x="70" y="66" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#f38ba8">5. Revert</text>
    <text x="70" y="86" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">One-click undo</text>
    <text x="70" y="102" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#a6adc8">Fully reversible</text>
  </g>
</svg>
