<svg xmlns="http://www.w3.org/2000/svg" width="900" height="440" viewBox="0 0 900 440">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#11111b" flood-opacity="0.6"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="url(#bgGrad)" rx="16"/>
  <text x="450" y="34" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Solution Overview</text>

  <!-- GUI -->
  <g filter="url(#shadow)">
    <rect x="60" y="60" width="200" height="60" rx="10" fill="#316044" stroke="#89b4fa" stroke-width="1.5"/>
    <text x="80" y="86" font-family="'Segoe UI', Arial, sans-serif" font-size="16">&#x1F5A5;&#xFE0F;</text>
    <text x="100" y="86" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#89b4fa">RegiLattice.GUI</text>
    <text x="160" y="106" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">WinForms &#x2022; 11 themes</text>
  </g>

  <!-- CLI -->
  <g filter="url(#shadow)">
    <rect x="300" y="60" width="200" height="60" rx="10" fill="#316044" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="320" y="86" font-family="'Segoe UI', Arial, sans-serif" font-size="16">&#x2328;&#xFE0F;</text>
    <text x="340" y="86" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#a6e3a1">RegiLattice.CLI</text>
    <text x="400" y="106" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">25+ commands</text>
  </g>

  <!-- "references" labels -->
  <text x="200" y="142" font-family="'Cascadia Code', monospace" font-size="9" fill="#585b70">references</text>
  <text x="380" y="142" font-family="'Cascadia Code', monospace" font-size="9" fill="#585b70">references</text>

  <!-- Arrows down to Core -->
  <line x1="160" y1="120" x2="310" y2="170" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>
  <line x1="400" y1="120" x2="380" y2="170" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.6"/>

  <!-- Core subgraph box -->
  <rect x="40" y="160" width="820" height="260" rx="12" fill="none" stroke="#585b70" stroke-width="1" stroke-dasharray="6 3"/>
  <text x="60" y="182" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">RegiLattice.Core</text>

  <!-- TweakEngine -->
  <g filter="url(#shadow)">
    <rect x="260" y="195" width="200" height="55" rx="10" fill="#45475a" stroke="#89b4fa" stroke-width="2"/>
    <text x="360" y="222" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="15" fill="#cdd6f4">TweakEngine</text>
    <text x="360" y="240" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">central orchestrator</text>
  </g>

  <!-- Models -->
  <g filter="url(#shadow)">
    <rect x="60" y="280" width="150" height="50" rx="8" fill="#316044" stroke="#f9e2af" stroke-width="1.2"/>
    <text x="135" y="304" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#f9e2af">Models</text>
    <text x="135" y="320" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">TweakDef &#x2022; RegOp &#x2022; ProfileDef</text>
  </g>

  <!-- RegistrySession -->
  <g filter="url(#shadow)">
    <rect x="230" y="280" width="150" height="50" rx="8" fill="#316044" stroke="#fab387" stroke-width="1.2"/>
    <text x="305" y="304" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#fab387">RegistrySession</text>
    <text x="305" y="320" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">Read &#x2022; Write &#x2022; DryRun</text>
  </g>

  <!-- Services -->
  <g filter="url(#shadow)">
    <rect x="400" y="280" width="150" height="50" rx="8" fill="#316044" stroke="#f38ba8" stroke-width="1.2"/>
    <text x="475" y="304" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#f38ba8">Services (15)</text>
    <text x="475" y="320" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">Analytics &#x2022; Config &#x2022; ...</text>
  </g>

  <!-- Tweaks -->
  <g filter="url(#shadow)">
    <rect x="570" y="280" width="150" height="50" rx="8" fill="#316044" stroke="#a6e3a1" stroke-width="1.2"/>
    <text x="645" y="304" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#a6e3a1">Tweaks/</text>
    <text x="645" y="320" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">180 files &#x2022; 7 568 tweaks</text>
  </g>

  <!-- Plugins -->
  <g filter="url(#shadow)">
    <rect x="570" y="350" width="150" height="50" rx="8" fill="#316044" stroke="#b4befe" stroke-width="1.2"/>
    <text x="645" y="374" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#b4befe">Plugins</text>
    <text x="645" y="390" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">Pack marketplace</text>
  </g>

  <!-- TweakEngine → sub-components -->
  <line x1="310" y1="250" x2="135" y2="278" stroke="#f9e2af" stroke-width="1" opacity="0.45"/>
  <line x1="340" y1="250" x2="305" y2="278" stroke="#fab387" stroke-width="1" opacity="0.45"/>
  <line x1="380" y1="250" x2="475" y2="278" stroke="#f38ba8" stroke-width="1" opacity="0.45"/>
  <line x1="400" y1="250" x2="645" y2="278" stroke="#a6e3a1" stroke-width="1" opacity="0.45"/>
  <line x1="400" y1="250" x2="645" y2="348" stroke="#b4befe" stroke-width="1" opacity="0.45"/>
</svg>
