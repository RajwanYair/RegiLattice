    <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bac2de">
      <text x="785" y="196">&#x2022; Remove bloatware</text>
      <text x="785" y="218">&#x2022; Disable Cortana</text>
      <text x="785" y="240">&#x2022; Edge restrictions</text>
      <text x="785" y="262">&#x2022; OneDrive controls</text>
      <text x="785" y="284">&#x2022; Widgets &amp; News off</text>
      <text x="785" y="306">&#x2022; Scheduled tasks</text>
