    <text x="1090" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Dev Tools</text>
    <text x="1090" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a6adc8">IT Admin</text>
    <line x1="1030" y1="172" x2="1150" y2="172" stroke="#45475a" stroke-width="1"/>
    <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bac2de">
      <text x="1025" y="196">&#x2022; WSL config</text>
      <text x="1025" y="218">&#x2022; VS Code tweaks</text>
      <text x="1025" y="240">&#x2022; PowerShell</text>
      <text x="1025" y="262">&#x2022; Terminal setup</text>
      <text x="1025" y="284">&#x2022; Dev Drive</text>
      <text x="1025" y="306">&#x2022; Git configs</text>
