    <text x="630" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Security</text>
    <text x="630" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a6adc8">Hardening</text>
    <line x1="550" y1="172" x2="710" y2="172" stroke="#45475a" stroke-width="1"/>
    <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bac2de">
      <text x="540" y="196">&#x2022; Firewall rules</text>
      <text x="540" y="218">&#x2022; DNS-over-HTTPS</text>
      <text x="540" y="240">&#x2022; SMB hardening</text>
      <text x="540" y="262">&#x2022; UAC enforcement</text>
      <text x="540" y="284">&#x2022; Corporate guard</text>
