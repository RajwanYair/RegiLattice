    <text x="875" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Debloat</text>
    <text x="875" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a6adc8">Cleanup</text>
