<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="cardShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#11111b" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bgGrad)" rx="16"/>

  <!-- Card 1: Privacy -->
  <g filter="url(#cardShadow)">
    <rect x="30" y="30" width="220" height="340" rx="12" fill="#313244"/>
    <rect x="30" y="30" width="220" height="4" rx="2" fill="#f38ba8"/>
    <text x="140" y="90" text-anchor="middle" font-size="36">&#x1F6E1;</text>
    <text x="140" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Privacy</text>
    <text x="140" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a6adc8">Hardening</text>
    <line x1="60" y1="172" x2="220" y2="172" stroke="#45475a" stroke-width="1"/>
    <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bac2de">
      <text x="50" y="196">&#x2022; Disable telemetry</text>
      <text x="50" y="218">&#x2022; Block ad tracking</text>
      <text x="50" y="240">&#x2022; Wi-Fi Sense off</text>
      <text x="50" y="262">&#x2022; Activity history</text>
      <text x="50" y="284">&#x2022; Location services</text>
      <text x="50" y="306">&#x2022; Diagnostic data</text>
    </g>
    <rect x="60" y="330" width="100" height="24" rx="12" fill="#f38ba8" opacity="0.2"/>
    <text x="110" y="347" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#f38ba8">2 800+ tweaks</text>
  </g>

  <!-- Card 2: Performance -->
  <g filter="url(#cardShadow)">
    <rect x="275" y="30" width="220" height="340" rx="12" fill="#313244"/>
    <rect x="275" y="30" width="220" height="4" rx="2" fill="#a6e3a1"/>
    <text x="385" y="90" text-anchor="middle" font-size="36">&#x26A1;</text>
    <text x="385" y="130" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="18" fill="#cdd6f4">Performance</text>
    <text x="385" y="155" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#a6adc8">Optimization</text>
    <line x1="305" y1="172" x2="465" y2="172" stroke="#45475a" stroke-width="1"/>
    <g font-family="'Segoe UI', Arial, sans-serif" font-size="12" fill="#bac2de">
      <text x="295" y="196">&#x2022; Disable animations</text>
      <text x="295" y="218">&#x2022; CPU priority tweaks</text>
      <text x="295" y="240">&#x2022; SSD optimization</text>
      <text x="295" y="262">&#x2022; Memory management</text>
      <text x="295" y="284">&#x2022; GPU scheduling</text>
      <text x="295" y="306">&#x2022; Network stack tuning</text>
    </g>
    <rect x="305" y="330" width="100" height="24" rx="12" fill="#a6e3a1" opacity="0.2"/>
    <text x="355" y="347" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" font-weight="600" fill="#a6e3a1">2 100+ tweaks</text>
  </g>

