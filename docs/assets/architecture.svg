  <text x="40" y="322" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">DATA LAYER</text>

  <!-- RegistrySession -->
  <g filter="url(#shadow)">
    <rect x="170" y="332" width="390" height="64" rx="10" fill="#316044" stroke="#fab387" stroke-width="1.5"/>
    <text x="365" y="358" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#fab387">RegistrySession</text>
    <text x="365" y="378" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Read &#x2022; Write &#x2022; Execute &#x2022; Backup &#x2022; DryRun</text>
  </g>

  <!-- Windows Registry (external) -->
  <g filter="url(#shadow)">
    <rect x="600" y="332" width="200" height="64" rx="10" fill="#45475a" stroke="#f38ba8" stroke-width="2" stroke-dasharray="6,3"/>
    <text x="700" y="358" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#f38ba8">Windows Registry</text>
    <text x="700" y="378" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">HKLM &#x2022; HKCU (external)</text>
  </g>

  <!-- Arrow: Engine -> RegistrySession -->
  <line x1="365" y1="286" x2="365" y2="330" stroke="#fab387" stroke-width="1.5" marker-end="url(#arrowOrange)" opacity="0.6"/>

  <!-- Arrow: RegistrySession -> Windows Registry -->
  <line x1="560" y1="364" x2="598" y2="364" stroke="#fab387" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowPink)" opacity="0.6"/>

  <!-- ===== ROW 4: TWEAK MODULES ===== -->
  <text x="40" y="428" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">TWEAK MODULES</text>

  <!-- Category pills -->
  <g filter="url(#shadow)">
    <rect x="40" y="440" width="130" height="42" rx="12" fill="#316044" stroke="#a6e3a1" stroke-width="1.2"/>
    <text x="105" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#a6e3a1">Performance</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="185" y="440" width="110" height="42" rx="12" fill="#316044" stroke="#89b4fa" stroke-width="1.2"/>
    <text x="240" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#89b4fa">Privacy</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="310" y="440" width="110" height="42" rx="12" fill="#316044" stroke="#f38ba8" stroke-width="1.2"/>
    <text x="365" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#f38ba8">Security</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="435" y="440" width="100" height="42" rx="12" fill="#316044" stroke="#f9e2af" stroke-width="1.2"/>
    <text x="485" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#f9e2af">Gaming</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="440" width="110" height="42" rx="12" fill="#316044" stroke="#b4befe" stroke-width="1.2"/>
    <text x="605" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#b4befe">Network</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="675" y="440" width="110" height="42" rx="12" fill="#316044" stroke="#fab387" stroke-width="1.2"/>
    <text x="730" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#fab387">Debloat</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="800" y="440" width="100" height="42" rx="12" fill="#316044" stroke="#cba6f7" stroke-width="1.2"/>
    <text x="850" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#cba6f7">Boot</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="915" y="440" width="145" height="42" rx="12" fill="#316044" stroke="#94e2d5" stroke-width="1.2"/>
    <text x="987" y="466" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#94e2d5">... +114 more</text>
  </g>

  <!-- Dashed lines: Tweaks -> Engine -->
  <line x1="300" y1="440" x2="310" y2="286" stroke="#585b70" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>
  <line x1="500" y1="440" x2="420" y2="286" stroke="#585b70" stroke-width="1" stroke-dasharray="4 3" opacity="0.3"/>

  <!-- ===== STATS BADGE ===== -->
  <g filter="url(#shadow)">
    <rect x="40" y="502" width="1020" height="44" rx="10" fill="#316044" stroke="#585b70" stroke-width="1"/>
    <text x="550" y="530" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">122 Categories &#x2022; 7349 Tweaks &#x2022; 162 Module Files &#x2022; 11 Themes &#x2022; 5 Profiles &#x2022; Fully Declarative &amp; Reversible</text>
  </g>

  <!-- ===== LEGEND ===== -->
  <g transform="translate(40, 570)" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#585b70">
    <rect x="0" y="0" width="12" height="12" rx="3" fill="#89b4fa"/>
    <text x="18" y="11">Core</text>
    <rect x="65" y="0" width="12" height="12" rx="3" fill="#a6e3a1"/>
    <text x="83" y="11">Validation</text>
    <rect x="165" y="0" width="12" height="12" rx="3" fill="#f38ba8"/>
    <text x="183" y="11">Services</text>
    <rect x="255" y="0" width="12" height="12" rx="3" fill="#fab387"/>
    <text x="273" y="11">Data</text>
    <rect x="315" y="0" width="12" height="12" rx="3" fill="#b4befe"/>
    <text x="333" y="11">Plugins</text>
    <rect x="400" y="0" width="12" height="12" rx="3" fill="#94e2d5"/>
    <text x="418" y="11">Infrastructure</text>
    <rect x="520" y="0" width="12" height="12" rx="3" fill="#f9e2af"/>
    <text x="538" y="11">Corp Guard</text>
    <rect x="630" y="0" width="18" height="12" rx="3" fill="none" stroke="#f38ba8" stroke-width="1.5" stroke-dasharray="3,2"/>
    <text x="654" y="11">External</text>
  </g>

  <!-- Version credit -->
  <text x="1060" y="620" text-anchor="end" font-family="'Cascadia Code', monospace" font-size="10" fill="#45475a">RegiLattice v6.19.0</text>
</svg>
