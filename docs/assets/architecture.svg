<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="640" viewBox="0 0 1100 640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#11111b" flood-opacity="0.6"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f38ba8"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f9e2af"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fab387"/>
    </marker>
    <marker id="arrowLav" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b4befe"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="640" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="#cdd6f4">RegiLattice &#x2014; Architecture Overview</text>

  <!-- ===== ROW 1: INTERFACES ===== -->
  <text x="40" y="68" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">INTERFACES</text>

  <!-- GUI -->
  <g filter="url(#shadow)">
    <rect x="40" y="80" width="230" height="64" rx="10" fill="#316044" stroke="#89b4fa" stroke-width="1.5"/>
    <text x="155" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#89b4fa">WinForms GUI</text>
    <text x="155" y="128" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">11 themes &#x2022; MainForm</text>
  </g>

  <!-- CLI -->
  <g filter="url(#shadow)">
    <rect x="290" y="80" width="230" height="64" rx="10" fill="#316044" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="405" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#a6e3a1">CLI</text>
    <text x="405" y="128" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">25+ commands &#x2022; args</text>
  </g>

  <!-- Interactive Menu -->
  <g filter="url(#shadow)">
    <rect x="540" y="80" width="230" height="64" rx="10" fill="#316044" stroke="#f9e2af" stroke-width="1.5"/>
    <text x="655" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#f9e2af">Interactive Menu</text>
    <text x="655" y="128" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">Console UI &#x2022; navigation</text>
  </g>

  <!-- Plugin API -->
  <g filter="url(#shadow)">
    <rect x="790" y="80" width="270" height="64" rx="10" fill="#316044" stroke="#b4befe" stroke-width="1.5"/>
    <text x="925" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#b4befe">Plugin API</text>
    <text x="925" y="128" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">JSON Packs &#x2022; SHA-256 &#x2022; Marketplace</text>
  </g>

  <!-- Arrows: Interfaces -> TweakEngine -->
  <line x1="155" y1="144" x2="330" y2="196" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.55"/>
  <line x1="405" y1="144" x2="410" y2="196" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.55"/>
  <line x1="655" y1="144" x2="490" y2="196" stroke="#f9e2af" stroke-width="1.5" marker-end="url(#arrowYellow)" opacity="0.55"/>
  <line x1="925" y1="144" x2="560" y2="196" stroke="#b4befe" stroke-width="1.5" marker-end="url(#arrowLav)" opacity="0.45"/>

  <!-- ===== ROW 2: CORE ENGINE ===== -->
  <text x="40" y="192" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">CORE ENGINE</text>

  <!-- TweakEngine (central, prominent) -->
  <g filter="url(#shadow)">
    <rect x="170" y="202" width="390" height="84" rx="10" fill="#45475a" stroke="#89b4fa" stroke-width="2"/>
    <text x="365" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="17" fill="#cdd6f4">TweakEngine</text>
    <text x="365" y="252" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Register &#x2022; Apply &#x2022; Remove &#x2022; Search &#x2022; Filter</text>
    <text x="365" y="270" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Profiles &#x2022; Dependencies &#x2022; Batch &#x2022; Validate</text>
  </g>

  <!-- Validation (left of engine) -->
  <g filter="url(#shadow)">
    <rect x="40" y="202" width="115" height="84" rx="10" fill="#316044" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="97" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="13" fill="#a6e3a1">Validation</text>
    <text x="97" y="252" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">Validator</text>
    <text x="97" y="268" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="9" fill="#a6adc8">Dep Resolver</text>
  </g>

  <!-- Services (right of engine - stacked) -->
  <g filter="url(#shadow)">
    <rect x="580" y="162" width="220" height="56" rx="10" fill="#316044" stroke="#f38ba8" stroke-width="1.5"/>
    <text x="690" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="13" fill="#f38ba8">Services (15+)</text>
    <text x="690" y="204" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Analytics &#x2022; Config &#x2022; Locale &#x2022; HwInfo</text>
  </g>

  <!-- CorporateGuard -->
  <g filter="url(#shadow)">
    <rect x="580" y="228" width="220" height="56" rx="10" fill="#316044" stroke="#f9e2af" stroke-width="1.5"/>
    <text x="690" y="252" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="13" fill="#f9e2af">CorporateGuard</text>
    <text x="690" y="270" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">AD &#x2022; AzureAD &#x2022; GPO &#x2022; Intune</text>
  </g>

  <!-- Infrastructure (far right, tall) -->
  <g filter="url(#shadow)">
    <rect x="820" y="162" width="240" height="186" rx="10" fill="#316044" stroke="#94e2d5" stroke-width="1.5"/>
    <text x="940" y="186" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="13" fill="#94e2d5">Infrastructure</text>
    <text x="840" y="210" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; SnapshotManager</text>
    <text x="840" y="228" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; ConfigExporter</text>
    <text x="840" y="246" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; SystemMonitor</text>
    <text x="840" y="264" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; Favorites / History</text>
    <text x="840" y="282" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; Ratings / Analytics</text>
    <text x="840" y="300" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; 5 Profiles &#x2022; Snapshots</text>
    <text x="840" y="318" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; Package Managers (5)</text>
    <text x="840" y="336" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">&#x2022; P/Invoke (4 calls only)</text>
  </g>

  <!-- Arrows: Engine <-> side boxes -->
  <line x1="560" y1="230" x2="578" y2="190" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#arrowPink)" opacity="0.45"/>
  <line x1="560" y1="256" x2="578" y2="256" stroke="#f9e2af" stroke-width="1.2" marker-end="url(#arrowYellow)" opacity="0.45"/>
  <line x1="155" y1="244" x2="168" y2="244" stroke="#a6e3a1" stroke-width="1.2" opacity="0.45"/>

