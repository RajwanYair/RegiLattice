<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="600" viewBox="0 0 1100 600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#11111b" flood-opacity="0.6"/>
    </filter>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#89b4fa"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a6e3a1"/>
    </marker>
    <marker id="arrowPink" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f38ba8"/>
    </marker>
    <marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#f9e2af"/>
    </marker>
    <marker id="arrowLav" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#b4befe"/>
    </marker>
  </defs>

  <rect width="1100" height="600" fill="url(#bgGrad)" rx="16"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="20" fill="#cdd6f4">RegiLattice &#x2014; Architecture Overview</text>

  <!-- ===== INTERFACES ROW ===== -->
  <text x="40" y="70" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">INTERFACES</text>

  <!-- CLI -->
  <g filter="url(#shadow)">
    <rect x="40" y="82" width="220" height="68" rx="10" fill="#313244" stroke="#a6e3a1" stroke-width="1.5"/>
    <text x="60" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="22">&#x2328;&#xFE0F;</text>
    <text x="90" y="108" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#a6e3a1">RegiLattice.CLI</text>
    <text x="150" y="136" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">25+ commands</text>
  </g>

  <!-- GUI -->
  <g filter="url(#shadow)">
    <rect x="290" y="82" width="220" height="68" rx="10" fill="#313244" stroke="#89b4fa" stroke-width="1.5"/>
    <text x="310" y="108" font-family="'Segoe UI', Arial, sans-serif" font-size="22">&#x1F5A5;&#xFE0F;</text>
    <text x="340" y="108" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#89b4fa">RegiLattice.GUI</text>
    <text x="400" y="136" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">11 themes &#x2022; WinForms</text>
  </g>

  <!-- Arrows Interface → Engine -->
  <line x1="150" y1="150" x2="400" y2="192" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrowGreen)" opacity="0.65"/>
  <line x1="400" y1="150" x2="440" y2="192" stroke="#89b4fa" stroke-width="1.5" marker-end="url(#arrowBlue)" opacity="0.65"/>

  <!-- ===== CORE ENGINE ROW ===== -->
  <text x="40" y="195" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">CORE ENGINE</text>

  <!-- TweakEngine (central) -->
  <g filter="url(#shadow)">
    <rect x="170" y="206" width="340" height="80" rx="10" fill="#45475a" stroke="#89b4fa" stroke-width="2"/>
    <text x="340" y="236" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="17" fill="#cdd6f4">TweakEngine</text>
    <text x="340" y="254" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Register &#x2022; Apply &#x2022; Search &#x2022; Filter</text>
    <text x="340" y="270" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Profiles &#x2022; Deps &#x2022; Batch &#x2022; Validate</text>
  </g>

  <!-- Services cluster (right of engine) -->
  <g filter="url(#shadow)">
    <rect x="550" y="82" width="200" height="60" rx="10" fill="#313244" stroke="#f38ba8" stroke-width="1.5"/>
    <text x="650" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#f38ba8">Services (15+)</text>
    <text x="650" y="126" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Analytics &#x2022; Locale &#x2022; HwInfo</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="156" width="200" height="60" rx="10" fill="#313244" stroke="#f9e2af" stroke-width="1.5"/>
    <text x="650" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#f9e2af">CorporateGuard</text>
    <text x="650" y="200" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">AD &#x2022; AzureAD &#x2022; GPO &#x2022; Intune</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="550" y="230" width="200" height="56" rx="10" fill="#313244" stroke="#b4befe" stroke-width="1.5"/>
    <text x="650" y="254" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#b4befe">Plugins / Packs</text>
    <text x="650" y="272" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">JSON &#x2022; SHA-256 &#x2022; Marketplace</text>
  </g>

  <!-- Arrows Engine → Services -->
  <line x1="510" y1="230" x2="548" y2="112" stroke="#f38ba8" stroke-width="1.2" marker-end="url(#arrowPink)" opacity="0.5"/>
  <line x1="510" y1="246" x2="548" y2="186" stroke="#f9e2af" stroke-width="1.2" marker-end="url(#arrowYellow)" opacity="0.5"/>
  <line x1="510" y1="256" x2="548" y2="258" stroke="#b4befe" stroke-width="1.2" marker-end="url(#arrowLav)" opacity="0.5"/>

  <!-- ===== REGISTRY SESSION ===== -->
  <g filter="url(#shadow)">
    <rect x="170" y="320" width="340" height="62" rx="10" fill="#313244" stroke="#fab387" stroke-width="1.5"/>
    <text x="340" y="346" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#fab387">RegistrySession</text>
    <text x="340" y="366" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Read &#x2022; Write &#x2022; Backup &#x2022; DryRun</text>
  </g>

  <!-- SnapshotManager + DependencyResolver + Validator -->
  <g filter="url(#shadow)">
    <rect x="800" y="82" width="260" height="204" rx="10" fill="#313244" stroke="#94e2d5" stroke-width="1.5"/>
    <text x="930" y="106" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="14" fill="#94e2d5">Infrastructure</text>
    <text x="820" y="134" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; SnapshotManager</text>
    <text x="820" y="156" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; TweakValidator</text>
    <text x="820" y="178" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; DependencyResolver</text>
    <text x="820" y="200" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; ConfigExporter</text>
    <text x="820" y="222" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; SystemMonitor</text>
    <text x="820" y="244" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; Favorites / History</text>
    <text x="820" y="266" font-family="'Cascadia Code', monospace" font-size="11" fill="#a6adc8">&#x2022; Ratings / Analytics</text>
  </g>

  <!-- Arrow Engine → RegistrySession -->
  <line x1="340" y1="286" x2="340" y2="318" stroke="#fab387" stroke-width="1.5" marker-end="url(#arrowYellow)" opacity="0.65"/>

  <!-- ===== TWEAKS ROW ===== -->
  <text x="40" y="420" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="12" fill="#585b70">TWEAK MODULES</text>

  <!-- Category pills -->
  <g filter="url(#shadow)">
    <rect x="40" y="434" width="145" height="46" rx="12" fill="#313244" stroke="#a6e3a1" stroke-width="1.2"/>
    <text x="112" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#a6e3a1">Performance</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="200" y="434" width="120" height="46" rx="12" fill="#313244" stroke="#89b4fa" stroke-width="1.2"/>
    <text x="260" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#89b4fa">Privacy</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="335" y="434" width="120" height="46" rx="12" fill="#313244" stroke="#f38ba8" stroke-width="1.2"/>
    <text x="395" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#f38ba8">Security</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="470" y="434" width="120" height="46" rx="12" fill="#313244" stroke="#f9e2af" stroke-width="1.2"/>
    <text x="530" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#f9e2af">Gaming</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="605" y="434" width="120" height="46" rx="12" fill="#313244" stroke="#b4befe" stroke-width="1.2"/>
    <text x="665" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#b4befe">Network</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="740" y="434" width="180" height="46" rx="12" fill="#313244" stroke="#94e2d5" stroke-width="1.2"/>
    <text x="830" y="462" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="600" font-size="13" fill="#94e2d5">... +117 more</text>
  </g>

  <!-- Arrows Tweaks → Engine -->
  <line x1="300" y1="434" x2="300" y2="286" stroke="#585b70" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>
  <line x1="440" y1="434" x2="360" y2="286" stroke="#585b70" stroke-width="1" stroke-dasharray="4 3" opacity="0.4"/>

  <!-- Stats badge -->
  <g filter="url(#shadow)">
    <rect x="40" y="500" width="880" height="44" rx="10" fill="#313244" stroke="#585b70" stroke-width="1"/>
    <text x="550" y="528" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="13" fill="#cdd6f4">122 Categories &#x2022; 7 189 Tweaks &#x2022; 146 Module Files &#x2022; Fully Declarative &amp; Reversible</text>
  </g>

  <!-- ===== WINDOWS REGISTRY (bottom) ===== -->
  <g filter="url(#shadow)">
    <rect x="800" y="320" width="260" height="62" rx="10" fill="#45475a" stroke="#f38ba8" stroke-width="2"/>
    <text x="860" y="346" font-family="'Segoe UI', Arial, sans-serif" font-size="20">&#x1F5C4;&#xFE0F;</text>
    <text x="890" y="346" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="15" fill="#f38ba8">Windows Registry</text>
    <text x="930" y="366" text-anchor="middle" font-family="'Cascadia Code', monospace" font-size="10" fill="#a6adc8">Microsoft.Win32.Registry</text>
  </g>

  <!-- Arrow RegistrySession → Windows Registry -->
  <line x1="510" y1="351" x2="798" y2="351" stroke="#fab387" stroke-width="1.5" marker-end="url(#arrowPink)" opacity="0.65"/>
</svg>
