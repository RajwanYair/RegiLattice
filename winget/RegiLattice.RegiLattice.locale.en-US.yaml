ShortDescription: Windows registry tweak toolkit with 1828+ tweaks, WinForms GUI, CLI, and profiles.
Description: >-
  RegiLattice is a .NET 10 (C#) Windows registry tweak manager featuring
  ~1828 tweaks across 72 categories. It provides a WinForms GUI with 4 themes
  (Catppuccin Mocha/Latte, Nord, Dracula), a 25+ command CLI, 5 profile
  presets (Business, Gaming, Privacy, Minimal, Server), snapshot & diff,
  corporate network detection, and dry-run safety. Self-contained x64 executable.
