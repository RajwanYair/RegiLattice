ShortDescription: Windows registry tweak toolkit with 1200+ tweaks, GUI, CLI, and profiles.
Description: >-
  RegiLattice is a Python-based Windows registry tweak manager featuring
  1228 tweaks across 64 categories. It provides a tkinter GUI with themes
  (Catppuccin Mocha/Latte, Nord, Dracula), an interactive CLI, profile
  presets (Business, Gaming, Privacy, Minimal, Server), snapshot & diff,
  corporate network detection, and dry-run safety. Requires Python 3.10+.
