ShortDescription: Windows registry tweak toolkit with 7,568 tweaks across 127 categories. WinForms GUI + CLI.
Description: >-
  RegiLattice is a .NET 10 (C#) Windows registry tweak manager featuring
  7,568 verified tweaks across 127 categories. It provides a WinForms GUI with 11 themes,
  a 25+ command CLI, 5 profile presets (Business, Gaming, Privacy, Minimal, Server),
  snapshot & diff, favorites export/import, tweak history, auto-backup before apply,
  corporate network detection, and dry-run safety. Self-contained x64 executable.
