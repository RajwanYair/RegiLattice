# Dependabot Configuration
# Automated dependency updates for RegiLattice (.NET 10 / C# 13).

version: 2
updates:
  # ── NuGet (.NET) ────────────────────────────────────────────────────────────
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "nuget"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      testing:
        patterns:
          - "xunit*"
          - "Microsoft.NET.Test.Sdk*"
          - "coverlet*"
      runtime:
        patterns:
          - "System.*"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 8
    assignees:
      - "RajwanYair"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      actions-core:
        patterns:
          - "actions/checkout"
          - "actions/setup-dotnet"
          - "actions/cache"
          - "actions/upload-artifact"
          - "actions/download-artifact"
          - "actions/labeler"
          - "actions/stale"
          - "actions/dependency-review-action"
          - "actions/github-script"
      security-actions:
        patterns:
          - "github/codeql-action*"
          - "step-security/*"
