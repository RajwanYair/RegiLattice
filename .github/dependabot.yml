# Dependabot Configuration
# Automated dependency updates for RegiLattice.

version: 2
updates:
  # ── Python dev dependencies ─────────────────────────────────────────────────
  # Runtime has zero dependencies (stdlib only). Only dev-time tools appear here.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      dev-tools:
        patterns:
          - "pytest*"
          - "pytest-cov*"
          - "mypy*"
          - "ruff*"
          - "hypothesis*"
          - "pytest-mock*"
          - "build"
          - "hatchling*"
          - "twine*"

  # ── GitHub Actions ──────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
