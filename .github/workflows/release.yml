name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to create the release for (e.g. v3.7.3). Required for manual re-runs when the original tag push failed."
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore RegiLattice.sln

      - name: Build Release
        run: dotnet build RegiLattice.sln -c Release --no-restore

      - name: Test
        run: >-
          dotnet test
          tests/RegiLattice.Core.Tests/RegiLattice.Core.Tests.csproj
          tests/RegiLattice.GUI.Tests/RegiLattice.GUI.Tests.csproj
          tests/RegiLattice.CLI.Tests/RegiLattice.CLI.Tests.csproj
          -c Release --no-build
          --settings tests/.runsettings
          --blame-hang-timeout 30s
          --logger "console;verbosity=minimal"

      - name: Publish GUI (self-contained)
        run: >-
          dotnet publish src/RegiLattice.GUI/RegiLattice.GUI.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/gui

      - name: Publish CLI (self-contained)
        run: >-
          dotnet publish src/RegiLattice.CLI/RegiLattice.CLI.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -o publish/cli

      - name: Install WiX toolset
        id: wix_install
        continue-on-error: true
        run: dotnet tool install --global wix --version 6.0.2

      - name: Build MSI installer
        id: msi_build
        continue-on-error: true
        if: steps.wix_install.outcome == 'success'
        run: dotnet build installer/RegiLattice.Installer.wixproj -c Release

      - name: Generate checksums
        shell: pwsh
        run: |
          $all = @()
          $all += Get-ChildItem "publish/gui" -File -Filter "*.exe" -ErrorAction SilentlyContinue
          $all += Get-ChildItem "publish/cli" -File -Filter "*.exe" -ErrorAction SilentlyContinue
          if (Test-Path "installer/bin/Release") {
            $all += Get-ChildItem "installer/bin/Release" -Recurse -File -Filter "*.msi"
          }
          $hashes = foreach ($f in $all) { Get-FileHash $f.FullName -Algorithm SHA256 }
          $hashes | ForEach-Object {
            $rel = $_.Path -replace [regex]::Escape((Get-Location).Path + '\'), '' -replace '\\', '/'
            "{0}  {1}" -f $_.Hash.ToLowerInvariant(), $rel
          } | Set-Content publish/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name || github.ref_name }}
          files: |
            publish/gui/RegiLattice.GUI.exe
            publish/cli/RegiLattice.exe
            installer/bin/Release/**/*.msi
            publish/SHA256SUMS.txt
          generate_release_notes: true
          fail_on_unmatched_files: false
