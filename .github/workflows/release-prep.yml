name: Release Preparation

# Creates a release issue and (optionally) a release branch + PR.
# Triggered manually when a version bump is planned.
#
# Steps:
#   1. Creates a GitHub Issue from the release template with a full checklist
#   2. Creates a release/vX.Y.Z branch from main
#   3. Creates a draft PR from that branch back to main
#
# After the PR is merged, tag and push to trigger release.yml.

on:
  workflow_dispatch:
    inputs:
      version:
        description: "New version (e.g. 6.15.0 — without the 'v' prefix)"
        required: true
        type: string
      bump_type:
        description: "Bump type"
        required: true
        type: choice
        options:
          - PATCH
          - MINOR
          - MAJOR
      summary:
        description: "Brief summary of changes in this release"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate version format
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid version format: '$VERSION'. Expected: X.Y.Z (e.g. 6.15.0)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "TAG=v$VERSION"   >> "$GITHUB_ENV"

      - name: Check tag does not already exist
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git rev-parse "v${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ inputs.version }} already exists"
            exit 1
          fi
          echo "Tag v${{ inputs.version }} is available"

      - name: Create release issue
        id: create-issue
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const version = '${{ inputs.version }}';
            const bump    = '${{ inputs.bump_type }}';
            const summary = `${{ inputs.summary }}`;

            // Ensure the 'release' label exists
            try {
              await github.rest.issues.createLabel({
                owner, repo,
                name: 'release',
                color: '6f42c1',
                description: 'Version release tracking',
              });
            } catch (e) {
              if (e.status !== 422) throw e;
            }

            const body = [
              `## Release v${version} (${bump})`,
              ``,
              `### Summary`,
              summary,
              ``,
              `### Pre-Release Checks`,
              `- [ ] \`dotnet build RegiLattice.sln -c Release\` — 0 errors, 0 warnings`,
              `- [ ] \`dotnet test\` — all 3 projects pass (0 failures)`,
              `- [ ] \`--validate\` — tweak integrity clean`,
              `- [ ] No stale debug code or \`.tmp/\` leftovers`,
              ``,
              `### Version Files Updated`,
              `- [ ] \`Directory.Build.props\` — all 4 version properties`,
              `- [ ] \`installer/Package.wxs\` — Version attribute`,
              `- [ ] \`docs/CHANGELOG.md\` — new version section added`,
              `- [ ] \`CHANGELOG.md\` (root stub) — updated`,
              `- [ ] \`README.md\` — badge, download link, counts`,
              `- [ ] \`.github/copilot-instructions.md\` — Quick Facts table`,
              `- [ ] SVG files updated (stats, banner, architecture, how-it-works, features)`,
              `- [ ] Package registry files (scoop, winget, chocolatey)`,
              ``,
              `### Release Steps`,
              `- [ ] Release PR merged to \`main\``,
              `- [ ] Committed: \`chore: bump version to v${version}\``,
              `- [ ] Tagged: \`git tag v${version}\``,
              `- [ ] Pushed: \`git push && git push --tags\``,
              `- [ ] GitHub Release verified — all artifacts present`,
              `- [ ] GitHub About sidebar updated (\`gh repo edit\`)`,
              ``,
              `### Linked PR`,
              `> PR will be linked automatically when the release branch is created.`,
              ``,
              `---`,
              `_Auto-created by [release-prep.yml](.github/workflows/release-prep.yml)_`,
            ].join('\n');

            const { data: issue } = await github.rest.issues.create({
              owner, repo,
              title: `Release v${version}`,
              body,
              labels: ['release'],
            });

            core.setOutput('issue_number', issue.number);
            core.setOutput('issue_url', issue.html_url);
            core.notice(`Created release issue #${issue.number}: ${issue.html_url}`);

      - name: Create release branch
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "release/v${{ inputs.version }}"
          git push origin "release/v${{ inputs.version }}"
          echo "Branch release/v${{ inputs.version }} created and pushed"

      - name: Create draft pull request
        uses: actions/github-script@v9
        with:
          script: |
            const { owner, repo } = context.repo;
            const version     = '${{ inputs.version }}';
            const issueNumber = ${{ steps.create-issue.outputs.issue_number }};
            const bump        = '${{ inputs.bump_type }}';
            const summary     = `${{ inputs.summary }}`;

            const body = [
              `## Release v${version} (${bump})`,
              ``,
              summary,
              ``,
              `Closes #${issueNumber}`,
              ``,
              `### Checklist`,
              `- [ ] All version files updated (see release issue #${issueNumber})`,
              `- [ ] CHANGELOG entry added`,
              `- [ ] Tests pass locally and in CI`,
              `- [ ] SVG assets updated if counts changed`,
              `- [ ] Ready to tag \`v${version}\` after merge`,
              ``,
              `---`,
              `_Auto-created by [release-prep.yml](.github/workflows/release-prep.yml)_`,
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner, repo,
              title: `chore: release v${version}`,
              body,
              head: `release/v${version}`,
              base: 'main',
              draft: true,
            });

            // Link PR back to the issue
            await github.rest.issues.createComment({
              owner, repo,
              issue_number: issueNumber,
              body: `Release PR created: #${pr.number}`,
            });

            core.notice(`Created draft PR #${pr.number}: ${pr.html_url}`);

      - name: Summary
        shell: bash
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << 'EOF'
          ## Release Preparation Complete

          | Item | Value |
          |------|-------|
          | **Version** | `v${{ inputs.version }}` |
          | **Bump** | ${{ inputs.bump_type }} |
          | **Issue** | #${{ steps.create-issue.outputs.issue_number }} |
          | **Branch** | `release/v${{ inputs.version }}` |

          ### Next Steps
          1. Check out the release branch: `git checkout release/v${{ inputs.version }}`
          2. Update all version files (see issue checklist)
          3. Push changes to the release branch
          4. Mark the PR as ready for review
          5. Merge the PR to `main`
          6. Tag and push: `git tag v${{ inputs.version }} && git push --tags`
          EOF
